name: Docker Base Build and Push

env:
  DOCKERHUB_REPO: admonstrator/paperless-ai-next

on:
  workflow_dispatch:
    inputs:
      also_tag_latest:
        description: 'Keep latest base tags (always true by default)'
        required: false
        default: true
        type: boolean
      build_arm64:
        description: 'Also build ARM64 (slower, more expensive)'
        required: false
        default: true
        type: boolean
      build_lite_base:
        description: 'Build/push lite base image'
        required: false
        default: true
        type: boolean
      build_full_base:
        description: 'Build/push full base image'
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build-base-lite:
    name: Build and Push Lite Base Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.build_lite_base }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=latest-base-lite,enable=${{ inputs.also_tag_latest || github.event_name == 'schedule' }}

      - name: Build and Push Lite Base Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base.lite
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.build_arm64 && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-base-lite
          cache-to: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-base-lite,mode=min
        timeout-minutes: 60

  build-base-full:
    name: Build and Push Full Base Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.build_full_base }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=latest-base-full,enable=${{ inputs.also_tag_latest || github.event_name == 'schedule' }}

      - name: Build and Push Full Base Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base.full
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.build_arm64 && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-base-full
          cache-to: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-base-full,mode=min
        timeout-minutes: 120

  summary:
    name: Base Build Summary
    runs-on: ubuntu-latest
    needs: [build-base-lite, build-base-full]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "### 🧱 Docker Base Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**ARM64 enabled:** ${{ inputs.build_arm64 || github.event_name == 'schedule' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub Repository:** \`${{ env.DOCKERHUB_REPO }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Base tags" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKERHUB_REPO }}:latest-base-lite\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKERHUB_REPO }}:latest-base-full\`" >> $GITHUB_STEP_SUMMARY
