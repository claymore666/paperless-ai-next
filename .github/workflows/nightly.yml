name: Nightly Build

on:
  push:
    branches:
      - 'fix/*'
      - 'nightly'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  merge-to-nightly:
    # Only run merge step for fix/* branches, skip for direct nightly pushes
    if: startsWith(github.ref, 'refs/heads/fix/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge fix branch into nightly
        run: |
          git checkout nightly
          if git merge --no-edit -m "auto-merge: ${{ github.ref_name }} into nightly" ${{ github.ref_name }}; then
            git push origin nightly || echo "Nothing to push (already up to date)"
          else
            echo "Merge failed or already merged — skipping"
          fi

  build-and-tag:
    runs-on: ubuntu-latest
    needs: [merge-to-nightly]
    if: always() && (needs.merge-to-nightly.result != 'cancelled')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nightly

      - name: Set date tag
        id: date
        run: echo "tag=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build standard image (modern CPUs, numpy>=2 OK)
      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base.full
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-base-full
          cache-from: type=gha,scope=base-full
          cache-to: type=gha,mode=max,scope=base-full

      - name: Build and push full image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-base-full
            PAPERLESS_AI_COMMIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-full
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${{ steps.date.outputs.tag }}
          cache-from: type=gha,scope=app-full
          cache-to: type=gha,mode=max,scope=app-full

      # Build legacy image (Ivy Bridge / pre-AVX2 CPUs, numpy<2)
      - name: Pin numpy<2 for legacy CPU compatibility
        run: |
          sed -i 's|numpy>=1.24.2|numpy>=1.24.2,<2.0.0|' requirements.txt

      - name: Build and push legacy base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base.full
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-base-full-legacy
          cache-from: type=gha,scope=base-full-legacy
          cache-to: type=gha,mode=max,scope=base-full-legacy

      - name: Build and push legacy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-base-full-legacy
            PAPERLESS_AI_COMMIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-full-legacy
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-legacy-${{ steps.date.outputs.tag }}
          cache-from: type=gha,scope=app-full-legacy
          cache-to: type=gha,mode=max,scope=app-full-legacy

      - name: Create or update git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="nightly-${{ steps.date.outputs.tag }}"
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG"

      - name: Delete existing releases for same day tag
        run: |
          TAG="nightly-${{ steps.date.outputs.tag }}"
          # Delete all releases (published + drafts) matching this tag
          while gh release delete "$TAG" --yes 2>/dev/null; do
            echo "Deleted release $TAG, checking for more..."
          done
          echo "No more releases for $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.date.outputs.tag }}
          name: Nightly ${{ steps.date.outputs.tag }}
          body: |
            Automated nightly build from `nightly` branch.

            Includes all fix branches merged to date.

            ## Docker images

            | Image | CPU | Pull command |
            |-------|-----|-------------|
            | `nightly-full` | Modern (AVX2+) | `docker pull ghcr.io/${{ github.repository }}:nightly-full` |
            | `nightly-full-legacy` | Legacy (Ivy Bridge, pre-AVX2) | `docker pull ghcr.io/${{ github.repository }}:nightly-full-legacy` |
          prerelease: true
          generate_release_notes: false
